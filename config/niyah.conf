[engine]
version=5
codename=Dragon
default_model=auto

[ollama]
url=http://localhost:11434
timeout=120
max_retries=3

[three_lobe]
sensory_model=niyah:writer
cognitive_model=niyah:sovereign
executive_model=niyah:v4

[anti_hallucination]
temperature=0.3
top_p=0.85
freq_penalty=0.5
presence_penalty=0.3
repeat_penalty=1.15
max_tokens=4096

[identity]
name=NIYAH
org=KHAWRIZM Labs
author=Sulaiman Alshammari
codename=Dragon403
honest_model=true

[memory]
session_persistence=true
max_context_messages=50
data_dir=/var/lib/niyah

[privacy]
telemetry=false
log_queries=local_only
send_data_external=never
pdpl_compliant=true
nca_ecc_compliant=true

[server]
host=0.0.0.0
port=7474
cors_origin=*
